name: Tax Calculator Spring CI/CD to GCP GKE

on:
  # push
  workflow_dispatch


jobs:
    build-test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service: [service-a, service-b]

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup JDK
            uses: actions/setup-java@v5
            with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

          - name: Build and Test (Maven)
            working-directory: docker/app2-tax-calculator/spring/${{ matrix.service }}
            run: mvn -B clean verify

          - name: Upload Test Reports
            uses: actions/upload-artifact@v4
            with:
                name: test-reports-${{ matrix.service }}
                path: docker/app2-tax-calculator/spring/${{ matrix.service }}/target/surefire-reports

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
        strategy:
            matrix:
                service: 
                    - { name: "service-a", docker_name: "tax-service-a", path: "docker/app2-tax-calculator/spring/service-a"}
                    - { name: "service-b", docker_name: "tax-service-b", path: "docker/app2-tax-calculator/spring/service-b"}

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup JDK
            uses: actions/setup-java@v5
            with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

          - name: Build JAR for Docker
            working-directory: ${{ matrix.service.path }}
            run: mvn -B clean package -DskipTests

          - name: Login to DockerHub
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}   
            
          - name: Build and Push Docker Image
            uses: docker/build-push-action@v6
            with:
                context: ${{ matrix.service.path }}
                push: true
                tags: |
                    ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.docker_name }}:latest   


    deploy-gcp-gke:
        runs-on: ubuntu-latest
        needs: docker-build-push

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Authenticate to Google Cloud
            uses: 'google-github-actions/auth@v3'
            with:
              credentials_json: ${{ secrets.GCP_SA_KEY }}

          - name: Setup gcloud CLI
            uses: 'google-github-actions/setup-gcloud@v3'

          - name: Install gke-cloud-auth-plugin
            run: |
              gcloud components install gke-gcloud-auth-plugin

          - name: Configure kubectl for GKE
            run: |
              gcloud container clusters get-credentials ${{ secrets.GCP_CLUSTER_NAME }} \
                --region ${{ secrets.GCP_REGION }}
      
          - name: Verify connection
            run: kubectl get nodes

          - name: Deploy to GKE (Google Kubernetes Engine)
            run: |
                kubectl apply -f k8s/gcp/app2-tax-calculator/service-a
                kubectl apply -f k8s/gcp/app2-tax-calculator/service-b
                kubectl apply -f k8s/gcp/app2-tax-calculator/frontend
                kubectl apply -f k8s/gcp/app2-tax-calculator/ingress.yaml

