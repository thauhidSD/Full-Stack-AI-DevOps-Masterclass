name: Tax Calculator Node CI/CD to Azure AKS

on:
  # push
  workflow_dispatch


jobs:
    build-test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service: [service-a, service-b]

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v6
            with:
                node-version: '25'

          - name: Install Dependencies
            working-directory: docker/app2-tax-calculator/node/${{ matrix.service }}
            run: npm install

          - name: Run Tests (If any)
            working-directory: docker/app2-tax-calculator/node/${{ matrix.service }}
            run: npm test --if-present

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
        strategy:
            matrix:
                service: 
                    - { name: "service-a", docker_name: "tax-service-a", path: "docker/app2-tax-calculator/node/service-a"}
                    - { name: "service-b", docker_name: "tax-service-b", path: "docker/app2-tax-calculator/node/service-b"}

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Login to DockerHub
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}   

          - name: Set up QEMU
            uses: docker/setup-qemu-action@v3
          
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3
                            
          - name: Build and Push Docker Image
            uses: docker/build-push-action@v6
            with:
                context: ${{ matrix.service.path }}
                platforms: linux/amd64,linux/arm64
                push: true
                tags: |
                    ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.docker_name }}:node-latest   


    deploy-aks:
        runs-on: ubuntu-latest
        needs: docker-build-push

        permissions:
          id-token: write
          contents: read

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
          
          - name: Debug Secrets (safe check)
            run: |
              echo "CLIENT_ID length: ${#CLIENT_ID}"
              echo "TENANT_ID length: ${#TENANT_ID}"
              echo "SUB_ID length: ${#SUB_ID}"
              echo "CLIENT_ID starts with: ${CLIENT_ID:0:8}..."
              echo "TENANT_ID starts with: ${TENANT_ID:0:8}..."
            env:
              CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
              TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
              SUB_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          - name: Authenticate to Azure
            uses: azure/login@v2
            with:
              client-id: ${{ secrets.AZURE_CLIENT_ID }}
              tenant-id: ${{ secrets.AZURE_TENANT_ID }}
              subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
              
          - name: Setup kubectl
            uses: azure/setup-kubectl@v4

          - name: Debug AKS Secrets Again
            run: |
              echo "CLUSTER_NAME length: ${#CLUSTER_NAME}"
              echo "RESOURCE_GROUP length: ${#RESOURCE_GROUP}"
              echo "CLUSTER_NAME value: ${CLUSTER_NAME}"
              echo "RESOURCE_GROUP value: ${RESOURCE_GROUP}"
            env:
              CLUSTER_NAME: ${{ secrets.AZURE_AKS_CLUSTER_NAME }}
              RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

          - name: Set AKS Context
            run: |
              az aks get-credentials \
                --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                --name ${{ secrets.AZURE_AKS_CLUSTER_NAME }}
      
          - name: Verify connection
            run: kubectl get nodes

          - name: Deploy to Azure AKS
            run: kubectl apply -f k8s/azure/app1-hello




